<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FungiVision</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* =========================
      BODY STYLING
      ========================= */
      body {
        font-family: "Inter", "Poppins", sans-serif;
        background: linear-gradient(135deg, #f4f8fc, #eff4f9, #f7fafc);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding-top: 85px;
        color: #1e293b;
        overflow-x: hidden;
      }

      /* =========================
      NAVBAR (MODERN GLASSMORPHISM)
      ========================= */
      .navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 99999;
        background: rgba(15, 23, 42, 0.95) !important;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.08);
        padding: 12px 0;
        transition: all 0.3s ease;
      }

      /* =========================
      BRAND IDENTITY
      ========================= */
      .navbar-brand {
        color: #ffffff !important;
        font-family: "Poppins", sans-serif;
        font-weight: 800;
        font-size: 22px;
        letter-spacing: -0.5px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .navbar-brand i {
        background: linear-gradient(135deg, #0077ff, #00bfff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 24px;
      }

      /* =========================
      NAVIGATION LINKS
      ========================= */
      .navbar-nav {
        gap: 6px;
      }

      .nav-link {
        color: rgba(255, 255, 255, 0.8) !important;
        font-weight: 500;
        font-size: 14.5px;
        padding: 8px 16px !important;
        border-radius: 12px;
        transition: all 0.25s ease;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      /* HOVER EFFECTS */
      .nav-link:hover {
        color: #00bfff !important;
        background: rgba(255, 255, 255, 0.05);
        transform: translateY(-1px);
      }

      .nav-link i {
        font-size: 14px;
        opacity: 0.85;
      }

      /* ACTIVE NAVIGATION STATE (SLEEK & PREMIUM) */
      .active-nav {
        background: rgba(0, 119, 255, 0.15) !important;
        color: #00d4ff !important;
        font-weight: 600;
        border: 1px solid rgba(0, 191, 255, 0.25);
        box-shadow: 0 4px 15px rgba(0, 119, 255, 0.1);
      }

      /* =========================
      MAIN CONTENT CONTAINMENT
      ========================= */
      .main-content {
        flex: 1;
        padding-top: 15px;
        padding-bottom: 60px;
      }

      /* =========================
      REUSABLE GLOBAL CLASSES
      ========================= */
      .card-custom {
        background: #ffffff;
        border-radius: 24px;
        padding: 35px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
        border: 1px solid #e2e8f0;
      }

      .btn-custom {
        background: linear-gradient(135deg, #0077ff, #00bfff);
        color: #ffffff;
        border: none;
        padding: 12px 28px;
        border-radius: 14px;
        font-weight: 600;
        font-size: 14px;
        transition: all 0.25s ease;
        box-shadow: 0 8px 20px rgba(0, 119, 255, 0.15);
      }

      .btn-custom:hover {
        transform: translateY(-2px);
        color: #ffffff;
        box-shadow: 0 12px 24px rgba(0, 119, 255, 0.25);
      }

      /* =========================
      FOOTER (CLEAN & SUBTLE)
      ========================= */
      footer {
        background: #0f172a;
        color: #94a3b8;
        text-align: center;
        padding: 20px;
        border-top: 1px solid #1e293b;
        margin-top: auto;
      }

      footer p {
        margin: 0;
        font-size: 13.5px;
        font-weight: 400;
        letter-spacing: 0.2px;
      }

      /* =========================
      CUSTOM MODERN SCROLLBAR
      ========================= */
      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      ::-webkit-scrollbar-track {
        background: #f8fafc;
      }

      /* =========================
      RESPONSIVE MOBILE OVERRIDES
      ========================= */
      @media (max-width: 991px) {
        .navbar-nav {
          padding: 15px 0 5px 0;
          align-items: flex-start;
          width: 100%;
        }

        .nav-link {
          width: 100%;
          padding: 10px 16px !important;
        }
      }

      @media (max-width: 768px) {
        body {
          padding-top: 75px;
        }

        .navbar-brand {
          font-size: 20px;
        }

        .main-content {
          padding-bottom: 40px;
        }
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="/">
          <i class="fas fa-bacteria"></i>
          FungiVision
        </a>

        <button
          class="navbar-toggler border-0"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a
                class="nav-link {% if request.path == '/' %}active-nav{% endif %}"
                href="/"
              >
                <i class="fas fa-house"></i> Home
              </a>
            </li>

            <li class="nav-item">
              <a
                class="nav-link {% if request.path == '/prediction' %}active-nav{% endif %}"
                href="/prediction"
              >
                <i class="fas fa-microscope"></i> Fungi Prediction
              </a>
            </li>

            <li class="nav-item">
              <a
                class="nav-link {% if request.path == '/encyclopedia' %}active-nav{% endif %}"
                href="/encyclopedia"
              >
                <i class="fas fa-book-medical"></i> Fungi Encyclopedia
              </a>
            </li>

            <li class="nav-item">
              <a
                class="nav-link {% if request.path == '/dashboard' %}active-nav{% endif %}"
                href="/dashboard"
              >
                <i class="fas fa-chart-line"></i> Dashboard
              </a>
            </li>

            <li class="nav-item">
              <a
                class="nav-link {% if request.path == '/about' %}active-nav{% endif %}"
                href="/about"
              >
                <i class="fas fa-circle-info"></i> About
              </a>
            </li>

            <li class="nav-item">
              <a
                class="nav-link {% if request.path == '/history' %}active-nav{% endif %}"
                href="/history"
              >
                <i class="fas fa-clock-rotate-left"></i> History
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container main-content">{% block content %} {% endblock %}</div>

    <footer>
      <p>© 2026 FungiVision | Deep Learning-Based Fungi Detection System</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
